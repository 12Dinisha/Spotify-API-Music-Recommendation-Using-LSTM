[build-system]
requires = ["setuptools>=58", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "Spotify-API-Music-Recommendation-Using-LSTM"
version = "0.1.0"
description = "This project is based on Deep learning ..."
authors = [{name = "Spotify API Music Recommendation Using LSTM ", email = "dinishajain4@gmail.com"}]
license = {text = "MIT"}
dependencies = [
    "flask==2.0.2",
    "requests==2.26.0",
    "numpy==1.21.2",
    "pandas==1.3.3",
    "scikit-learn==0.24.2"
]

[tool.setuptools.packages.find]
where = ["src"]
